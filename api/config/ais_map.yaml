# Calque AIS : corridors (relevés dans le front, const AIS lanes) → bbox
# de souscription AISStream. margin_deg élargit la boîte autour du segment.
# Contrat front : {lon, lat, type} avec type ∈ {TANKER, CARGO} — seuls les
# types AIS 70-79 (cargo) et 80-89 (tanker) sont servis.

corridors:
  - {name: ORMUZ-SINGAPOUR,    a: [56.3, 26.6],   b: [103.8, 1.3]}
  - {name: SUEZ-BAB-EL-MANDEB, a: [32.35, 30.45], b: [43.33, 12.58]}
  - {name: SHANGHAI-SINGAPOUR, a: [121.8, 31.2],  b: [103.8, 1.3]}
  - {name: ROTTERDAM-GIBRALTAR, a: [4.5, 51.9],   b: [-5.6, 35.95]}
  - {name: HOUSTON-PANAMA,     a: [-95.3, 29.7],  b: [-79.68, 9.08]}
  - {name: GIBRALTAR-SUEZ,     a: [-5.6, 35.95],  b: [32.35, 30.45]}

margin_deg: 3.0

# flush du buffer mémoire vers parquet (data/ais/)
flush_seconds: 60
# service : ~40 navires affichés, répartis par corridor (récence d'abord)
serve_max: 40
stale_after_minutes: 15

# reconnexion WebSocket : backoff exponentiel borné
reconnect_min_s: 2
reconnect_max_s: 120
